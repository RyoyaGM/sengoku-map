<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国時代 郡地図（完全自立版）</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #4682b4; } /* 最下層：海の青色 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // ★大手術：エラーの元凶だった「外部プラグイン」の代わりとなる翻訳機をここに自作して内蔵しました。
        // これにより、ダウンロード済みの「dem_png」を直接読み込んで3Dの影に変換できます。
        maplibregl.addProtocol('gsidem', (params, callback) => {
            const url = params.url.replace('gsidem://', '');
            const image = new Image();
            image.crossOrigin = 'Anonymous';
            image.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(image, 0, 0);
                const imgData = ctx.getImageData(0, 0, 256, 256);
                const data = imgData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    if (r === 128 && g === 0 && b === 0) {
                        data[i+3] = 0; // 海の部分は透明にする
                    } else {
                        let u = r * 65536 + g * 256 + b;
                        let h = (u < 8388608) ? u : u - 16777216;
                        const v = Math.round((h * 0.01 + 10000) * 10);
                        data[i] = (v >> 16) & 0xff;
                        data[i+1] = (v >> 8) & 0xff;
                        data[i+2] = v & 0xff;
                        data[i+3] = 255;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                canvas.toBlob(blob => blob.arrayBuffer().then(arr => callback(null, arr, null, null)));
            };
            image.onerror = () => callback(new Error('タイル読込失敗'));
            image.src = url;
            return { cancel: () => { image.src = ''; } };
        });

        // Github Pages 上の /tiles フォルダを参照する設定
        const baseUrl = window.location.href.replace(/index\.html$/, '').replace(/\/$/, '');
        const localTileUrl = 'gsidem://' + baseUrl + '/tiles/{z}/{x}/{y}.png';

        // 地図の組み立て
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'local-terrain': { type: 'raster-dem', tiles: [localTileUrl], tileSize: 256, maxzoom: 13 }
                },
                layers: [
                    // 1層目(一番下)：画面全体を海の色で固定
                    { id: 'background', type: 'background', paint: { 'background-color': '#4682b4' } }
                ]
            },
            center: [134.3, 34.0],
            zoom: 8
        });

        map.on('load', () => {
            // 2層目(中間)：ローカルの標高データを使って山の影を描画
            map.addLayer({
                id: 'hillshade-layer',
                type: 'hillshade',
                source: 'local-terrain',
                paint: { 'hillshade-exaggeration': 1.5, 'hillshade-shadow-color': '#222' }
            });

            // 3層目(一番上)：GeoJSON（陸地データ）をそのまま緑色で上に乗せる
            fetch('./mapdata.json')
                .then(res => res.json())
                .then(data => {
                    map.addSource('gun-data', { type: 'geojson', data: data });
                    
                    // 陸地を塗る（GeoJSONの仕様上、湖には最初から穴が空いているため、自動的に一番下の青色が見える！）
                    map.addLayer({
                        id: 'land-fill',
                        type: 'fill',
                        source: 'gun-data',
                        paint: { 'fill-color': '#556b2f', 'fill-opacity': 0.8 }
                    });
                    
                    // 境界線
                    map.addLayer({
                        id: 'borders',
                        type: 'line',
                        source: 'gun-data',
                        paint: { 'line-color': '#fff', 'line-width': 0.5, 'line-opacity': 0.5 }
                    });
                    
                    // ラベル
                    map.addLayer({
                        id: 'labels',
                        type: 'symbol',
                        source: 'gun-data',
                        layout: { 'text-field': ['get', 'GUN'], 'text-size': 11 },
                        paint: { 'text-color': '#222', 'text-halo-color': '#fff', 'text-halo-width': 1 }
                    });

                    // ズーム合わせ
                    const bbox = turf.bbox(data);
                    map.fitBounds(bbox, { padding: 40, duration: 1000 });
                });
        });
    </script>
</body>
</html>
