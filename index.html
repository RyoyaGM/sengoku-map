<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>戦国時代 郡地図（安定版）</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    // ★土台：国土地理院の陰影起伏図を直接読み込む
                    'gsi-hillshade': {
                        type: 'raster',
                        tiles: ['https://cyberjapandata.gsi.go.jp/xyz/hillshademap/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        maxzoom: 16,
                        attribution: '国土地理院'
                    }
                },
                layers: [
                    // 1層目：山の起伏（陰影図）を全面に表示
                    {
                        id: 'hillshade-layer',
                        type: 'raster',
                        source: 'gsi-hillshade',
                        paint: { 'raster-opacity': 1.0 }
                    }
                ]
            },
            center: [134.3, 34.0],
            zoom: 9
        });

        map.on('load', () => {
            // 2層目：郡の境界線とラベルだけを乗せる
            fetch('./mapdata.json')
                .then(res => res.json())
                .then(data => {
                    map.addSource('gun-data', { type: 'geojson', data: data });

                    // 郡の境界線（黒か濃い茶色にすると古地図っぽくなります）
                    map.addLayer({
                        id: 'borders',
                        type: 'line',
                        source: 'gun-data',
                        paint: {
                            'line-color': '#4a3a2a', // 濃い茶色
                            'line-width': 1.2,
                            'line-opacity': 0.7
                        }
                    });

                    // 郡名（筆文字風のフォントがなくても読みやすく配置）
                    map.addLayer({
                        id: 'labels',
                        type: 'symbol',
                        source: 'gun-data',
                        layout: {
                            'text-field': ['get', 'GUN'],
                            'text-size': 13,
                            'text-font': ['Open Sans Bold', 'Arial Unicode MS Regular']
                        },
                        paint: {
                            'text-color': '#000000',
                            'text-halo-color': '#ffffff',
                            'text-halo-width': 2
                        }
                    });

                    // 地図の範囲を合わせる
                    const bbox = turf.bbox(data);
                    map.fitBounds(bbox, { padding: 50 });
                });
        });
    </script>
</body>
</html>
