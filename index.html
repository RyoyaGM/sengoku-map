<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国時代 郡地図（プラグイン不要版）</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #222; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #status {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: white; padding: 10px; border-radius: 5px; font-family: sans-serif;
            font-size: 13px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="status">地図を描画中...（数秒お待ちください）</div>
    <div id="map"></div>

    <script>
        const statusEl = document.getElementById('status');

        // 地図の初期化
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    // 国土地理院の「すでに影になっている画像（陰影起伏図）」をネットから直接取得
                    'gsi-hillshade': {
                        type: 'raster',
                        tiles: ['https://cyberjapandata.gsi.go.jp/xyz/hillshademap/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        maxzoom: 16,
                        attribution: '国土地理院'
                    }
                },
                layers: [
                    // 1層目（最背面）: 陸地のベースとなる緑色
                    { id: 'land-base', type: 'background', paint: { 'background-color': '#556b2f' } },
                    
                    // 2層目（中間）: 影の画像を半透明にして上に乗せる（これで緑色の立体的な山脈ができます）
                    { id: 'hillshade-layer', type: 'raster', source: 'gsi-hillshade', paint: { 'raster-opacity': 0.6, 'raster-contrast': 0.2 } }
                ]
            },
            center: [134.3, 34.0], // 初期位置
            zoom: 8
        });

        map.on('load', () => {
            // ローカルの GeoJSON (mapdata.json) を読み込む
            fetch('./mapdata.json')
                .then(res => {
                    if (!res.ok) throw new Error("JSONが見つかりません");
                    return res.json();
                })
                .then(data => {
                    renderMap(map, data);
                    statusEl.style.display = 'none';
                })
                .catch(e => {
                    statusEl.innerHTML = `<span style="color:red">エラー: mapdata.json が読み込めません</span>`;
                });
        });

        function renderMap(map, geojsonData) {
            // ポリゴンの回転方向（時計回り・反時計回り）を強制する関数
            function isClockwise(ring) {
                let sum = 0;
                for (let i = 0; i < ring.length - 1; i++) sum += (ring[i+1][0] - ring[i][0]) * (ring[i+1][1] + ring[i][1]);
                return sum > 0;
            }
            function forceClockwise(ring) { return isClockwise(ring) ? ring : ring.slice().reverse(); }
            function forceCCW(ring) { return !isClockwise(ring) ? ring : ring.slice().reverse(); }

            // 3層目（最前面）: 世界全体を覆う「青いシート」を作り、陸地の形に穴を開ける
            const worldBounds = [[-180, 85], [-180, -85], [180, -85], [180, 85], [-180, 85]];
            const maskCoordinates = [ forceCCW(worldBounds) ];

            geojsonData.features.forEach(f => {
                const coords = f.geometry.coordinates;
                if (f.geometry.type === 'Polygon') {
                    maskCoordinates.push(forceClockwise(coords[0])); // 陸地（穴を開ける）
                    for (let i = 1; i < coords.length; i++) maskCoordinates.push(forceCCW(coords[i])); // 湖（穴を塞いで青にする）
                } else if (f.geometry.type === 'MultiPolygon') {
                    coords.forEach(p => {
                        maskCoordinates.push(forceClockwise(p[0]));
                        for (let i = 1; i < p.length; i++) maskCoordinates.push(forceCCW(p[i]));
                    });
                }
            });

            // 海と湖の青色レイヤーを追加
            map.addSource('mask-source', { type: 'geojson', data: { "type": "FeatureCollection", "features": [{ "type": "Feature", "geometry": { "type": "Polygon", "coordinates": maskCoordinates } }] } });
            map.addLayer({ id: 'sea-mask', type: 'fill', source: 'mask-source', paint: { 'fill-color': '#4682b4', 'fill-opacity': 1.0 } });

            // 郡の境界線
            map.addSource('gun-data', { type: 'geojson', data: geojsonData });
            map.addLayer({ id: 'borders', type: 'line', source: 'gun-data', paint: { 'line-color': '#ffffff', 'line-width': 1.0, 'line-opacity': 0.6 } });
            
            // 郡の名前（ラベル）
            map.addLayer({
                id: 'labels', type: 'symbol', source: 'gun-data',
                layout: { 'text-field': ['get', 'GUN'], 'text-size': 12 },
                paint: { 'text-color': '#222222', 'text-halo-color': '#ffffff', 'text-halo-width': 1.5 }
            });

            // カメラをデータの範囲に自動で合わせる
            const bbox = turf.bbox(geojsonData);
            map.fitBounds(bbox, { padding: 40, duration: 1500 });
        }
    </script>
</body>
</html>
