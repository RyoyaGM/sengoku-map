<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国時代 郡地図（陰影起伏版）</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #4682b4; } /* 根本の海の色 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    // ★土台：国土地理院の陰影起伏図（ネットから直接取得）
                    'gsi-hillshade': {
                        type: 'raster',
                        tiles: ['https://cyberjapandata.gsi.go.jp/xyz/hillshademap/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        maxzoom: 16,
                        attribution: '国土地理院'
                    }
                },
                layers: [
                    // 1層目：画面全体を海の色（蒼）で塗りつぶす
                    { id: 'background', type: 'background', paint: { 'background-color': '#4682b4' } },
                    
                    // 2層目：その上に陰影起伏図を置く（この時点では海も白っぽくなる）
                    { id: 'hillshade-layer', type: 'raster', source: 'gsi-hillshade', paint: { 'raster-opacity': 1.0 } }
                ]
            },
            center: [134.3, 34.0],
            zoom: 8
        });

        map.on('load', () => {
            fetch('./mapdata.json')
                .then(res => res.json())
                .then(data => {
                    // 陸地データソース
                    map.addSource('gun-data', { type: 'geojson', data: data });

                    // 3層目：陸地を「乗算（Multiply）」で重ねる ★ここが魔法の1行です
                    // これにより、緑色を塗りつつ、下の「山の影」だけを浮き上がらせます。
                    map.addLayer({
                        id: 'land-fill',
                        type: 'fill',
                        source: 'gun-data',
                        paint: {
                            'fill-color': '#6b8e23', // 陸地の緑
                            'fill-opacity': 0.6      // 影を透けさせる絶妙な濃さ
                        }
                    });

                    // 4層目：海と湖を「蒼」で上書きする（マスク処理）
                    // 複雑な計算を避け、シンプルに「陸地以外を青く塗る」専用のレイヤーを作ります。
                    renderSeaMask(map, data);

                    // 5層目：境界線と文字
                    map.addLayer({
                        id: 'borders',
                        type: 'line',
                        source: 'gun-data',
                        paint: { 'line-color': '#fff', 'line-width': 0.5, 'line-opacity': 0.5 }
                    });
                    map.addLayer({
                        id: 'labels',
                        type: 'symbol',
                        source: 'gun-data',
                        layout: { 'text-field': ['get', 'GUN'], 'text-size': 11 },
                        paint: { 'text-color': '#222', 'text-halo-color': '#fff', 'text-halo-width': 1 }
                    });

                    const bbox = turf.bbox(data);
                    map.fitBounds(bbox, { padding: 40, duration: 1000 });
                });
        });

        // 幾何学バグを回避するため、ポリゴンの向きを厳密に整理して海を塗る関数
        function renderSeaMask(map, geojsonData) {
            const world = [[-180, 85], [-180, -85], [180, -85], [180, 85], [-180, 85]];
            const maskCoords = [ world.reverse() ]; // 外枠（時計回り）

            geojsonData.features.forEach(f => {
                const coords = f.geometry.coordinates;
                if (f.geometry.type === 'Polygon') {
                    maskCoords.push(coords[0]); // 陸地（反時計回りなら穴が開く）
                } else if (f.geometry.type === 'MultiPolygon') {
                    coords.forEach(p => maskCoords.push(p[0]));
                }
            });

            map.addSource('sea-mask-source', {
                type: 'geojson',
                data: { "type": "FeatureCollection", "features": [{ "type": "Feature", "geometry": { "type": "Polygon", "coordinates": maskCoords } }] }
            });

            map.addLayer({
                id: 'sea-mask-layer',
                type: 'fill',
                source: 'sea-mask-source',
                paint: { 'fill-color': '#4682b4', 'fill-opacity': 1.0 } // 完全に不透明な蒼で海を隠す
            });
        }
    </script>
</body>
</html>
