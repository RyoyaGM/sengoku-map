<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国時代 郡地図</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl-gsi-terrain@1.0.0/dist/maplibre-gl-gsi-terrain.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #4682b4; } /* 海の青色 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); color: white; padding: 20px; border-radius: 10px;
            font-family: sans-serif; z-index: 100; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">地図データを展開中...</div>
    <div id="map"></div>

    <script>
        // 地形データを解読する設定
        maplibregl.addProtocol('gsidem', maplibreglGsiTerrain.rasterDemProtocol);
        
        // 自分のサイトのURLからタイルの場所を特定
        const baseUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '');
        const localTileUrl = 'gsidem://' + baseUrl + 'tiles/{z}/{x}/{y}.png';

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'local-terrain': { type: 'raster-dem', tiles: [localTileUrl], tileSize: 256, maxzoom: 13 }
                },
                layers: [
                    // 【1層目：最背面】 背景（海の色）
                    { id: 'background', type: 'background', paint: { 'background-color': '#4682b4' } }
                ]
            },
            center: [134.3, 34.0],
            zoom: 8
        });

        map.on('load', () => {
            // 【2層目：中間】 山の起伏（影）を海の上に表示
            map.addLayer({
                id: 'hillshade-layer',
                type: 'hillshade',
                source: 'local-terrain',
                paint: {
                    'hillshade-exaggeration': 1.5,
                    'hillshade-shadow-color': '#222222',
                    'hillshade-highlight-color': '#ffffff'
                }
            });

            // 【3層目：最前面】 陸地データを読み込んで重ねる
            fetch('./mapdata.json')
                .then(response => response.json())
                .then(geojsonData => {
                    renderMap(geojsonData);
                    document.getElementById('loading').style.display = 'none';
                })
                .catch(error => {
                    console.error('読み込み失敗:', error);
                    alert('地図データ(mapdata.json)が見つかりません。ファイル名を確認してください。');
                });
        });

        function renderMap(geojsonData) {
            // 陸地の塗りつぶし（湖はデータ上で穴になっているため、自動的に下の海の色が見える）
            map.addSource('gun-data-source', { type: 'geojson', data: geojsonData });
            
            map.addLayer({
                id: 'land-fill-layer',
                type: 'fill',
                source: 'gun-data-source',
                paint: {
                    'fill-color': '#6b8e23', // 陸地の緑
                    'fill-opacity': 0.7      // 下の山の影が透けて見えるように調整
                }
            });

            // 境界線
            map.addLayer({
                id: 'gun-border-layer',
                type: 'line',
                source: 'gun-data-source',
                paint: { 'line-color': '#ffffff', 'line-width': 1.0, 'line-opacity': 0.5 }
            });

            // ラベル
            map.addLayer({
                id: 'gun-label-layer',
                type: 'symbol',
                source: 'gun-data-source',
                layout: {
                    'text-field': ['get', 'GUN'],
                    'text-font': ['sans-serif'],
                    'text-size': 12,
                    'text-anchor': 'center'
                },
                paint: {
                    'text-color': '#333333',
                    'text-halo-color': '#ffffff',
                    'text-halo-width': 1.5
                }
            });

            // データの範囲に自動ジャンプ
            const bbox = turf.bbox(geojsonData);
            map.fitBounds(bbox, { padding: 40, duration: 1000 });
        }
    </script>
</body>
</html>
