<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国時代 郡地図（完成版）</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script src="https://unpkg.com/maplibre-gl-gsi-terrain@1.0.0/dist/maplibre-gl-gsi-terrain.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #4682b4; } /* 背景：海の色 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #status {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: white; padding: 10px; border-radius: 5px; font-family: sans-serif;
            font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">システム起動中...</div>
    <div id="map"></div>

    <script>
        const statusEl = document.getElementById('status');

        // すべてのスクリプト（道具）が読み込まれてから実行する
        window.onload = function() {
            try {
                // 1. 地形プラグインの確認
                if (typeof maplibreglGsiTerrain === 'undefined') {
                    throw new Error("地形プラグインの読み込みに失敗しました。");
                }
                
                // 地形データをMapLibreが読める形に翻訳する設定
                maplibregl.addProtocol('gsidem', maplibreglGsiTerrain.rasterDemProtocol);
                statusEl.innerText = "地図エンジン起動完了。JSONを読込中...";

                // 2. パスの設定（GitHub Pagesの階層に対応）
                const baseUrl = window.location.href.replace(/index\.html$/, '').replace(/\/$/, '');
                const localTileUrl = 'gsidem://' + baseUrl + '/tiles/{z}/{x}/{y}.png';

                // 3. 地図の初期化
                const map = new maplibregl.Map({
                    container: 'map',
                    style: {
                        version: 8,
                        sources: {
                            'local-terrain': { type: 'raster-dem', tiles: [localTileUrl], tileSize: 256, maxzoom: 13 }
                        },
                        layers: [
                            { id: 'background', type: 'background', paint: { 'background-color': '#4682b4' } }
                        ]
                    },
                    center: [134.3, 34.0], // 阿波国周辺
                    zoom: 8
                });

                map.on('load', () => {
                    // 4. 山の影レイヤー
                    map.addLayer({
                        id: 'hillshade-layer',
                        type: 'hillshade',
                        source: 'local-terrain',
                        paint: { 'hillshade-exaggeration': 1.5, 'hillshade-shadow-color': '#333' }
                    });

                    // 5. GeoJSON(mapdata.json)の読み込み
                    fetch('./mapdata.json')
                        .then(res => {
                            if (!res.ok) throw new Error("mapdata.json が見つかりません。");
                            return res.json();
                        })
                        .then(data => {
                            renderMap(map, data);
                            statusEl.innerText = "戦国郡地図 描画完了！";
                            setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
                        })
                        .catch(err => {
                            statusEl.innerHTML = `<span class="error">エラー: ${err.message}</span>`;
                        });
                });

            } catch (e) {
                statusEl.innerHTML = `<span class="error">起動エラー: ${e.message}</span>`;
            }
        };

        function renderMap(map, geojsonData) {
            function isClockwise(ring) {
                let sum = 0;
                for (let i = 0; i < ring.length - 1; i++) sum += (ring[i+1][0] - ring[i][0]) * (ring[i+1][1] + ring[i][1]);
                return sum > 0;
            }
            function forceClockwise(ring) { return isClockwise(ring) ? ring : ring.slice().reverse(); }
            function forceCCW(ring) { return !isClockwise(ring) ? ring : ring.slice().reverse(); }

            // 世界を覆う青い海シート
            const worldBounds = [[-180, 85], [-180, -85], [180, -85], [180, 85], [-180, 85]];
            const maskCoordinates = [ forceCCW(worldBounds) ];

            // 陸地の形に合わせて海シートをくり抜く（湖は自動で青くなる）
            geojsonData.features.forEach(f => {
                const coords = f.geometry.coordinates;
                if (f.geometry.type === 'Polygon') {
                    maskCoordinates.push(forceClockwise(coords[0]));
                    for (let i = 1; i < coords.length; i++) maskCoordinates.push(forceCCW(coords[i]));
                } else if (f.geometry.type === 'MultiPolygon') {
                    coords.forEach(p => {
                        maskCoordinates.push(forceClockwise(p[0]));
                        for (let i = 1; i < p.length; i++) maskCoordinates.push(forceCCW(p[i]));
                    });
                }
            });

            // くり抜いた海マスクを描画
            map.addSource('mask-source', { type: 'geojson', data: { "type": "FeatureCollection", "features": [{ "type": "Feature", "geometry": { "type": "Polygon", "coordinates": maskCoordinates } }] } });
            map.addLayer({ id: 'sea-mask', type: 'fill', source: 'mask-source', paint: { 'fill-color': '#4682b4', 'fill-opacity': 1.0 } });

            // 陸地を緑で塗る（半透明にして下の山の影を透けさせる）
            map.addSource('gun-data', { type: 'geojson', data: geojsonData });
            map.addLayer({ id: 'land-fill', type: 'fill', source: 'gun-data', paint: { 'fill-color': '#6b8e23', 'fill-opacity': 0.6 } });
            
            // 郡の境界線
            map.addLayer({ id: 'borders', type: 'line', source: 'gun-data', paint: { 'line-color': '#fff', 'line-width': 0.5, 'line-opacity': 0.5 } });
            
            // 郡の名前
            map.addLayer({
                id: 'labels', type: 'symbol', source: 'gun-data',
                layout: { 'text-field': ['get', 'GUN'], 'text-size': 11, 'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'] },
                paint: { 'text-color': '#222', 'text-halo-color': '#fff', 'text-halo-width': 1 }
            });

            // 地図をデータの範囲に自動で合わせる
            const bbox = turf.bbox(geojsonData);
            map.fitBounds(bbox, { padding: 50, duration: 1500 });
        }
    </script>
</body>
</html>
