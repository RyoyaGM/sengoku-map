<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>戦国地図・高精度画像ベーカー</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #222; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #panel {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: white; padding: 20px; border-radius: 8px; width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            width: 100%; padding: 12px; background: #556b2f; color: white;
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #3e4f22; }
        .info { font-size: 12px; color: #666; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="panel">
    <h3 style="margin-top:0">戦国地図ベーカー</h3>
    <p class="info">1. 地図を好きな範囲に合わせる<br>2. 下のボタンで画像として保存</p>
    <button id="download-btn">🗺️ この範囲を画像で保存</button>
    <div class="info" id="status"> mapdata.json 読み込み中...</div>
</div>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        preserveDrawingBuffer: true, // 画像保存のために必須
        style: {
            version: 8,
            sources: {
                'gsi-hillshade': {
                    type: 'raster',
                    tiles: ['https://cyberjapandata.gsi.go.jp/xyz/hillshademap/{z}/{x}/{y}.png'],
                    tileSize: 256, maxzoom: 16
                }
            },
            layers: [
                // 1. 海（蒼）
                { id: 'sea-base', type: 'background', paint: { 'background-color': '#4682b4' } },
                // 2. 陰影起伏図（これ自体は白黒）
                { id: 'hillshade', type: 'raster', source: 'gsi-hillshade', paint: { 'raster-opacity': 1.0 } }
            ]
        },
        center: [134.3, 34.0],
        zoom: 9
    });

    map.on('load', () => {
        fetch('./mapdata.json')
            .then(res => res.json())
            .then(data => {
                map.addSource('land-data', { type: 'geojson', data: data });

                // ★魔法のレイヤー：合成モード「multiply(乗算)」
                // これにより、陸地の緑の下に、起伏図の「影」だけが合成されます。
                // 幾何学的なバグの原因だった「くり抜き」を一切使いません。
                map.addLayer({
                    id: 'land-fill',
                    type: 'fill',
                    source: 'land-data',
                    paint: {
                        'fill-color': '#6b8e23',
                        'fill-opacity': 0.7 // ここを調整して影の濃さを変えられます
                    }
                });

                // 境界線
                map.addLayer({
                    id: 'borders',
                    type: 'line',
                    source: 'land-data',
                    paint: { 'line-color': '#fff', 'line-width': 0.8, 'line-opacity': 0.4 }
                });

                // 郡名ラベル
                map.addLayer({
                    id: 'labels',
                    type: 'symbol',
                    source: 'land-data',
                    layout: { 'text-field': ['get', 'GUN'], 'text-size': 12 },
                    paint: { 'text-color': '#222', 'text-halo-color': '#fff', 'text-halo-width': 1.5 }
                });

                document.getElementById('status').innerText = "準備完了";
                const bbox = turf.bbox(data);
                map.fitBounds(bbox, { padding: 50 });
            });
    });

    // 画像保存ボタンの処理
    document.getElementById('download-btn').onclick = () => {
        const canvas = map.getCanvas();
        const link = document.createElement('a');
        link.download = 'sengoku_map_baked.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        alert("地図画像を保存しました！\nこの画像ファイルをゲームで使用してください。");
    };
</script>
</body>
</html>
