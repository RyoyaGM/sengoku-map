<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>戦国時代 郡地図（決定版）</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #4682b4; } /* 根本の海の色 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // ★標高データから「海の影」を消去する自作翻訳機
        maplibregl.addProtocol('gsidem', (params, callback) => {
            const url = params.url.replace('gsidem://', '');
            const image = new Image();
            image.crossOrigin = 'Anonymous';
            image.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(image, 0, 0);
                const imgData = ctx.getImageData(0, 0, 256, 256);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    // 海（128, 0, 0）を検知したら、その場所の標高を「完全に平ら（0m）」に書き換える
                    if (data[i] === 128 && data[i+1] === 0 && data[i+2] === 0) {
                        data[i] = 1; data[i+1] = 134; data[i+2] = 160; // 0m相当のTerrain-RGB値
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                canvas.toBlob(blob => blob.arrayBuffer().then(arr => callback(null, arr, null, null)));
            };
            image.src = url;
            return { cancel: () => { image.src = ''; } };
        });

        const baseUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '');
        const localTileUrl = 'gsidem://' + baseUrl + 'tiles/{z}/{x}/{y}.png';

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'local-terrain': { type: 'raster-dem', tiles: [localTileUrl], tileSize: 256, maxzoom: 13 }
                },
                layers: [
                    // 1. 最下層：全体を青く塗る（海になる）
                    { id: 'background', type: 'background', paint: { 'background-color': '#4682b4' } }
                ]
            },
            center: [134.3, 34.0],
            zoom: 9
        });

        map.on('load', () => {
            fetch('./mapdata.json').then(res => res.json()).then(data => {
                map.addSource('land-source', { type: 'geojson', data: data });

                // 2. 中層：陸地を「緑」で塗る
                // GeoJSONの仕様で、湖の部分は勝手に「穴」になるので、下の青が見えます。
                map.addLayer({
                    id: 'land-fill',
                    type: 'fill',
                    source: 'land-source',
                    paint: { 'fill-color': '#556b2f', 'fill-opacity': 1.0 }
                });

                // 3. 最上層：山の「影」だけを重ねる
                // 下の緑色に対して「影」として作用するため、緑の山脈が浮かび上がります。
                map.addLayer({
                    id: 'hillshade-layer',
                    type: 'hillshade',
                    source: 'local-terrain',
                    paint: {
                        'hillshade-exaggeration': 2.0, // 険しさを強調
                        'hillshade-shadow-color': '#000000',
                        'hillshade-highlight-color': '#ffffff',
                        'hillshade-accent-color': '#000000'
                    }
                });

                // 4. 装飾：境界線と郡名
                map.addLayer({
                    id: 'borders',
                    type: 'line',
                    source: 'land-source',
                    paint: { 'line-color': '#fff', 'line-width': 0.5, 'line-opacity': 0.4 }
                });
                map.addLayer({
                    id: 'labels',
                    type: 'symbol',
                    source: 'land-source',
                    layout: { 'text-field': ['get', 'GUN'], 'text-size': 12 },
                    paint: { 'text-color': '#fff', 'text-halo-color': '#222', 'text-halo-width': 1.5 }
                });

                const bbox = turf.bbox(data);
                map.fitBounds(bbox, { padding: 50 });
            });
        });
    </script>
</body>
</html>
