<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国時代 郡地図</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl-gsi-terrain@1.0.0/dist/maplibre-gl-gsi-terrain.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #4682b4; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #status {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: white; padding: 10px; border-radius: 5px; font-family: sans-serif;
            font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="status">地図を組み立て中...</div>
    <div id="map"></div>

    <script>
        const statusEl = document.getElementById('status');

        window.onload = function() {
            try {
                // 翻訳機（道具）が正しく読み込まれたか確認
                if (typeof maplibreglGsiTerrain === 'undefined') {
                    throw new Error("道具（プラグイン）の読み込みに失敗しました。ネット接続を確認してください。");
                }
                
                maplibregl.addProtocol('gsidem', maplibreglGsiTerrain.rasterDemProtocol);

                // あなたのGitHub上の tiles フォルダを見に行く設定
                const baseUrl = window.location.href.replace(/index\.html$/, '').replace(/\/$/, '');
                const localTileUrl = 'gsidem://' + baseUrl + '/tiles/{z}/{x}/{y}.png';

                const map = new maplibregl.Map({
                    container: 'map',
                    style: {
                        version: 8,
                        sources: {
                            'local-terrain': { type: 'raster-dem', tiles: [localTileUrl], tileSize: 256, maxzoom: 13 }
                        },
                        layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#4682b4' } }]
                    },
                    center: [134.3, 34.0],
                    zoom: 8
                });

                map.on('load', () => {
                    // 山の影を描く
                    map.addLayer({
                        id: 'hillshade-layer',
                        type: 'hillshade',
                        source: 'local-terrain',
                        paint: { 'hillshade-exaggeration': 1.8, 'hillshade-shadow-color': '#222' }
                    });

                    // 陸地データを読み込む
                    fetch('./mapdata.json')
                        .then(res => res.json())
                        .then(data => {
                            renderMap(map, data);
                            statusEl.style.display = 'none';
                        });
                });
            } catch (e) {
                statusEl.innerHTML = `<span style="color:red">エラー: ${e.message}</span>`;
            }
        };

        function renderMap(map, geojsonData) {
            // 海をくり抜く処理
            const worldBounds = [[-180, 85], [-180, -85], [180, -85], [180, 85], [-180, 85]];
            const maskCoordinates = [ worldBounds.reverse() ];

            geojsonData.features.forEach(f => {
                const coords = f.geometry.coordinates;
                if (f.geometry.type === 'Polygon') {
                    maskCoordinates.push(coords[0]);
                } else if (f.geometry.type === 'MultiPolygon') {
                    coords.forEach(p => maskCoordinates.push(p[0]));
                }
            });

            map.addSource('mask-source', { type: 'geojson', data: { "type": "FeatureCollection", "features": [{ "type": "Feature", "geometry": { "type": "Polygon", "coordinates": maskCoordinates } }] } });
            map.addLayer({ id: 'sea-mask', type: 'fill', source: 'mask-source', paint: { 'fill-color': '#4682b4' } });

            // 陸地を塗る
            map.addSource('gun-data', { type: 'geojson', data: geojsonData });
            map.addLayer({ id: 'land-fill', type: 'fill', source: 'gun-data', paint: { 'fill-color': '#6b8e23', 'fill-opacity': 0.6 } });
            map.addLayer({ id: 'borders', type: 'line', source: 'gun-data', paint: { 'line-color': '#fff', 'line-width': 0.5, 'line-opacity': 0.5 } });
            map.addLayer({
                id: 'labels', type: 'symbol', source: 'gun-data',
                layout: { 'text-field': ['get', 'GUN'], 'text-size': 11 },
                paint: { 'text-color': '#222', 'text-halo-color': '#fff', 'text-halo-width': 1 }
            });

            const bbox = turf.bbox(geojsonData);
            map.fitBounds(bbox, { padding: 50, duration: 1000 });
        }
    </script>
</body>
</html>
